<svg viewBox="0 0 1000 1500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Coach Tabby versus Coach Rogue sold price, June 2026">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#311525"/><stop offset="1" stop-color="#180a11"/></linearGradient></defs>
  <rect x="0" y="0" width="1000" height="1500" fill="url(#bg)"/>
  <text x="500" y="118" text-anchor="middle" fill="#c9a24c" font-family="Georgia, serif" font-size="23" letter-spacing="6">SAME BRAND · 3X THE VALUE</text>
  <text x="500" y="222" text-anchor="middle" fill="#f3e9ec" font-family="Georgia, serif" font-size="56" font-weight="600">The trendy Coach isn't</text>
  <text x="500" y="288" text-anchor="middle" fill="#c9a24c" font-family="Georgia, serif" font-size="56" font-weight="600" font-style="italic">the one that holds.</text>

