<svg viewBox="0 0 1000 1500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Chanel Medium Classic Flap retail price by year, 2019 to 2026">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#311525"/><stop offset="1" stop-color="#180a11"/></linearGradient></defs>
  <rect x="0" y="0" width="1000" height="1500" fill="url(#bg)"/>
  <text x="500" y="118" text-anchor="middle" fill="#c9a24c" font-family="Georgia, serif" font-size="23" letter-spacing="6">CHANEL CLASSIC FLAP · MEDIUM</text>
  <text x="500" y="222" text-anchor="middle" fill="#f3e9ec" font-family="Georgia, serif" font-size="58" font-weight="600">The boutique price</text>
  <text x="500" y="290" text-anchor="middle" fill="#c9a24c" font-family="Georgia, serif" font-size="58" font-weight="600" font-style="italic">keeps climbing.</text>
  <text x="500" y="348" text-anchor="middle" fill="#b9a6ad" font-family="Georgia, serif" font-size="26">New retail, USD, by year</text>

  <line x1="120" y1="1085" x2="880" y2="1085" stroke="#5a3a46" stroke-width="2"/>
  <rect x="160" y="827" width="110" height="258" fill="#8a6f63"/>
  <rect x="350" y="605" width="110" height="480" fill="#c9a24c"/>
  <rect x="540" y="583" width="110" height="502" fill="#c9a24c"/>
  <rect x="730" y="565" width="110" height="520" fill="#c9a24c"/>
  <g font-family="Georgia, serif" font-size="32" fill="#f3e9ec" text-anchor="middle">
    <text x="215" y="805">$5,800</text><text x="405" y="583">$10,800</text>
    <text x="595" y="561">$11,300</text><text x="785" y="543">$11,700</text>
  </g>
  <g font-family="Georgia, serif" font-size="30" fill="#b9a6ad" text-anchor="middle">
    <text x="215" y="1140">2019</text><text x="405" y="1140">2024</text><text x="595" y="1140">2025</text><text x="785" y="1140">2026</text>
  </g>
  <text x="500" y="1300" text-anchor="middle" fill="#cdb8c0" font-family="Georgia, serif" font-size="31" font-style="italic">More than double in five years.</text>
  <text x="500" y="1352" text-anchor="middle" fill="#b9a6ad" font-family="Georgia, serif" font-size="27">On resale it's about half, near $6,000.</text>
  <text x="500" y="1424" text-anchor="middle" fill="#9a838c" font-family="Georgia, serif" font-size="22">Retail via PurseBop, PurseBlog, Sotheby's. Resale: our tracking, June 2026. Estimate, not an appraisal.</text>
</svg>
