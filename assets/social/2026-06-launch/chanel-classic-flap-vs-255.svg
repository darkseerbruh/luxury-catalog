<svg viewBox="0 0 1000 1500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">Chanel Classic Flap versus 2.55 clasp comparison</title>
  <desc id="d">A schematic comparing the interlocking CC turn-lock of the Classic Flap (1983) with the rectangular Mademoiselle lock of the 2.55 (1955).</desc>
  <rect x="0" y="0" width="1000" height="1500" fill="#FBF8F2"/>
  <rect x="40" y="40" width="920" height="1420" fill="none" stroke="#B08A3E" stroke-width="3"/>

  <text x="500" y="120" text-anchor="middle" fill="#B08A3E" font-family="Georgia, serif" font-size="26" letter-spacing="8">LUXURY CATALOG</text>
  <text x="500" y="235" text-anchor="middle" fill="#1A1A1A" font-family="Georgia, serif" font-size="74" font-weight="600">The lock tells you</text>
  <text x="500" y="320" text-anchor="middle" fill="#1A1A1A" font-family="Georgia, serif" font-size="74" font-weight="600">which Chanel</text>

  <!-- Panel A: Classic Flap, CC turn-lock -->
  <rect x="300" y="430" width="400" height="250" rx="20" fill="none" stroke="#1A1A1A" stroke-width="5"/>
  <circle cx="455" cy="555" r="78" fill="none" stroke="#1A1A1A" stroke-width="16"/>
  <circle cx="545" cy="555" r="78" fill="none" stroke="#1A1A1A" stroke-width="16"/>
  <text x="500" y="760" text-anchor="middle" fill="#1A1A1A" font-family="Georgia, serif" font-size="42" font-weight="600">Classic Flap</text>
  <text x="500" y="812" text-anchor="middle" fill="#5A5145" font-family="Georgia, serif" font-size="30">Interlocking CC turn-lock</text>
  <text x="500" y="856" text-anchor="middle" fill="#5A5145" font-family="Georgia, serif" font-size="30">Added by Lagerfeld, 1983</text>

  <line x1="180" y1="930" x2="820" y2="930" stroke="#B08A3E" stroke-width="2"/>

  <!-- Panel B: 2.55, rectangular Mademoiselle lock -->
  <rect x="380" y="1000" width="240" height="160" rx="14" fill="none" stroke="#1A1A1A" stroke-width="14"/>
  <rect x="438" y="1058" width="124" height="44" rx="8" fill="none" stroke="#1A1A1A" stroke-width="10"/>
  <text x="500" y="1255" text-anchor="middle" fill="#1A1A1A" font-family="Georgia, serif" font-size="42" font-weight="600">The 2.55</text>
  <text x="500" y="1307" text-anchor="middle" fill="#5A5145" font-family="Georgia, serif" font-size="30">Rectangular Mademoiselle lock</text>
  <text x="500" y="1351" text-anchor="middle" fill="#5A5145" font-family="Georgia, serif" font-size="30">Coco Chanel's original, 1955</text>

  <text x="500" y="1430" text-anchor="middle" fill="#B08A3E" font-family="Georgia, serif" font-size="27" font-style="italic">Same quilt, different clasp, different bag.</text>
</svg>
