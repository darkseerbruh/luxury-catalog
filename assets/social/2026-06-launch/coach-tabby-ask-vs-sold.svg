<svg viewBox="0 0 1000 1500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Coach Tabby listed price versus sold price, June 2026">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#311525"/><stop offset="1" stop-color="#180a11"/></linearGradient></defs>
  <rect x="0" y="0" width="1000" height="1500" fill="url(#bg)"/>
  <text x="500" y="120" text-anchor="middle" fill="#c9a24c" font-family="Georgia, serif" font-size="23" letter-spacing="7">COACH TABBY 26 · RESALE</text>
  <text x="500" y="232" text-anchor="middle" fill="#f3e9ec" font-family="Georgia, serif" font-size="60" font-weight="600">The listing is a hope.</text>
  <text x="500" y="300" text-anchor="middle" fill="#c9a24c" font-family="Georgia, serif" font-size="60" font-weight="600" font-style="italic">The sold price is the fact.</text>

  <line x1="150" y1="1075" x2="850" y2="1075" stroke="#5a3a46" stroke-width="2"/>
  <rect x="250" y="560" width="200" height="515" fill="#8a6f63"/>
  <rect x="550" y="796" width="200" height="279" fill="#c9a24c"/>
  <g font-family="Georgia, serif" text-anchor="middle">
    <text x="350" y="530" fill="#f3e9ec" font-size="58" font-weight="600">$365</text>
    <text x="650" y="766" fill="#f3e9ec" font-size="58" font-weight="600">$198</text>
  </g>
  <g font-family="Georgia, serif" font-size="29" fill="#b9a6ad" text-anchor="middle">
    <text x="350" y="1125">What it's listed for</text><text x="650" y="1125">What it sells for</text>
  </g>
  <text x="500" y="1255" text-anchor="middle" fill="#cdb8c0" font-family="Georgia, serif" font-size="31" font-style="italic">Almost half off what the tag says.</text>
  <text x="500" y="1320" text-anchor="middle" fill="#b9a6ad" font-family="Georgia, serif" font-size="27">The Rogue is the Coach that holds more, around $500 and up.</text>
  <text x="500" y="1420" text-anchor="middle" fill="#9a838c" font-family="Georgia, serif" font-size="22">eBay completed sales + reseller asking, June 2026. An estimate of the market, not an appraisal. luxurycatalog.com</text>
</svg>
