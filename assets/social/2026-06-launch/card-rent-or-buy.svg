<svg viewBox="0 0 1000 1500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rent when versus buy when">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#311525"/><stop offset="1" stop-color="#180a11"/></linearGradient></defs>
  <rect x="0" y="0" width="1000" height="1500" fill="url(#bg)"/>
  <text x="500" y="120" text-anchor="middle" fill="#c9a24c" font-family="Georgia, serif" font-size="23" letter-spacing="6">RENT OR BUY?</text>
  <text x="500" y="216" text-anchor="middle" fill="#f3e9ec" font-family="Georgia, serif" font-size="58" font-weight="600">Which one fits you</text>
  <line x1="500" y1="300" x2="500" y2="1120" stroke="#5a3a46" stroke-width="2"/>
  <text x="270" y="380" text-anchor="middle" fill="#c9a24c" font-family="Georgia, serif" font-size="38" font-style="italic">Rent when</text>
  <g font-family="Georgia, serif" font-size="30" fill="#e7dfe2">
    <text x="90" y="480">You chase trends</text><text x="90" y="558">It's an occasion bag</text>
    <text x="90" y="636">You want to try it first</text><text x="90" y="714">You'd skip reselling</text>
  </g>
  <text x="732" y="380" text-anchor="middle" fill="#c9a24c" font-family="Georgia, serif" font-size="38" font-style="italic">Buy when</text>
  <g font-family="Georgia, serif" font-size="30" fill="#e7dfe2">
    <text x="548" y="480">You'll carry it often</text><text x="548" y="558">You want a classic</text>
    <text x="548" y="636">You want to own it</text><text x="548" y="714">You found it well-priced</text>
  </g>
  <text x="500" y="1250" text-anchor="middle" fill="#cdb8c0" font-family="Georgia, serif" font-size="31" font-style="italic">The test: how often will you actually carry it?</text>
  <text x="500" y="1410" text-anchor="middle" fill="#9a838c" font-family="Georgia, serif" font-size="22">General information, not financial advice. luxurycatalog.com</text>
</svg>
