<svg viewBox="0 0 1000 1500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="What holds value versus what fades">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#311525"/><stop offset="1" stop-color="#180a11"/></linearGradient></defs>
  <rect x="0" y="0" width="1000" height="1500" fill="url(#bg)"/>
  <text x="500" y="120" text-anchor="middle" fill="#c9a24c" font-family="Georgia, serif" font-size="23" letter-spacing="6">DOES IT HOLD VALUE?</text>
  <text x="500" y="216" text-anchor="middle" fill="#f3e9ec" font-family="Georgia, serif" font-size="58" font-weight="600">What holds. What fades.</text>
  <line x1="500" y1="300" x2="500" y2="1120" stroke="#5a3a46" stroke-width="2"/>
  <text x="270" y="380" text-anchor="middle" fill="#9fd6a0" font-family="Georgia, serif" font-size="38" font-style="italic">Holds up</text>
  <g font-family="Georgia, serif" font-size="30" fill="#e7dfe2">
    <text x="90" y="480">Classic shapes</text><text x="90" y="558">Neutral colors</text>
    <text x="90" y="636">Heritage houses</text><text x="90" y="714">Full set, great condition</text>
  </g>
  <text x="732" y="380" text-anchor="middle" fill="#e6a06a" font-family="Georgia, serif" font-size="38" font-style="italic">Fades</text>
  <g font-family="Georgia, serif" font-size="30" fill="#e7dfe2">
    <text x="548" y="480">Trend-driven shapes</text><text x="548" y="558">Loud seasonal colors</text>
    <text x="548" y="636">Heavy logos</text><text x="548" y="714">Flooded brands, wear</text>
  </g>
  <text x="500" y="1250" text-anchor="middle" fill="#cdb8c0" font-family="Georgia, serif" font-size="30" font-style="italic">No bag is a guaranteed return. Buy what you'll carry.</text>
  <text x="500" y="1410" text-anchor="middle" fill="#9a838c" font-family="Georgia, serif" font-size="22">General patterns, not a promise. An estimate, not a forecast. luxurycatalog.com</text>
</svg>
