name: Refresh market listings (Fashionphile)

# Hands-off "keep the Shop current" job. Re-crawls Fashionphile's live inventory,
# loads fresh prices, then retires listings that have since sold or been pulled —
# so the Shop shows only what's actually for sale, without anyone running anything.
#
# Runs on a schedule AND on demand (Actions tab -> this workflow -> "Run workflow").
# Fashionphile is the only source crawlable headless in CI today; TheRealReal /
# Vestiaire still need a browser session, so they're reconciled manually for now.
#
# REQUIRED repo secrets (Settings -> Secrets and variables -> Actions) — the same
# two the rest of the pipeline uses:
#   • NEXT_PUBLIC_SUPABASE_URL
#   • SUPABASE_SERVICE_ROLE_KEY

on:
  schedule:
    # Daily 06:00 UTC. Adjust the cadence here if you want it more/less often.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      collection:
        description: "Fashionphile collection slug to crawl (default: handbags = all bags)"
        required: false
        default: "handbags"
      write:
        description: "Apply changes? false = dry run (crawl + report only, no DB writes)"
        required: false
        default: "true"

# Never let two refreshes overlap (they touch the same listings).
concurrency:
  group: market-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      COLLECTION: ${{ github.event.inputs.collection || 'handbags' }}
      # Scheduled runs always write; manual runs honour the dry-run toggle.
      WRITE: ${{ github.event_name == 'schedule' && 'true' || github.event.inputs.write }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Crawl Fashionphile live inventory
        run: npx tsx supabase/ingest/sources/fashionphile-crawl.ts "$COLLECTION"

      - name: Map crawl into price observations
        run: npx tsx supabase/ingest/sources/fashionphile.ts --raw

      - name: Load prices into the database
        run: |
          if [ "$WRITE" = "true" ]; then
            npm run load:prices -- --write
          else
            npm run load:prices
          fi

      - name: Retire sold / pulled listings
        run: |
          SNAP=data/ingest/_raw/fashionphile-live.json
          if [ "$WRITE" = "true" ]; then
            npm run reconcile:sold -- --platform=fashionphile --snapshot="$SNAP" --write
          else
            npm run reconcile:sold -- --platform=fashionphile --snapshot="$SNAP"
          fi
