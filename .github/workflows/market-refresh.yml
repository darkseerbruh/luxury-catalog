name: Refresh market listings (Fashionphile)

# Hands-off "drop sold bags off the Shop" job. Re-crawls Fashionphile's live
# inventory and retires the listings we still show that the crawl no longer sees
# (sold / pulled) — so the Shop reflects what's actually for sale, untouched by hand.
#
# SCOPE: this job ONLY retires sold listings; it does NOT load new prices. Loading
# fresh prices / new bags stays the existing manual, curated pipeline (ingest -> raw
# adapter -> load:prices) — bulk-loading the whole 20k catalogue nightly would flood
# discovered_listing and isn't needed to keep sold status current.
#
# Runs on a schedule AND on demand (Actions tab -> this workflow -> "Run workflow").
# Fashionphile is the only source crawlable headless in CI today; TheRealReal /
# Vestiaire still need a browser session, so they're reconciled manually for now.
#
# SECRETS: needs only SUPABASE_SERVICE_ROLE_KEY (already set on this repo). The
# Supabase URL is public (NEXT_PUBLIC_*), so it's inlined as a fallback below — no
# secret required; override with a NEXT_PUBLIC_SUPABASE_URL secret if the project
# ref ever changes. (Mirrors classify-families.yml.)

on:
  schedule:
    # Every 3 hours (listings sell hourly, so retire sold Fashionphile listings fast — this is
    # the only source crawlable headless). Off the :00 mark. Tune up/down here.
    - cron: "17 */3 * * *"
  workflow_dispatch:
    inputs:
      collection:
        description: "Fashionphile collection slug to crawl (default: handbags = all bags)"
        required: false
        default: "handbags"
      write:
        description: "Apply changes? false = dry run (crawl + report only, no DB writes)"
        required: false
        default: "true"

# Never let two refreshes overlap (they touch the same listings).
concurrency:
  group: market-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://pewmdztviyrtbhtebcct.supabase.co' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      COLLECTION: ${{ github.event.inputs.collection || 'handbags' }}
      # Scheduled runs always write; manual runs honour the dry-run toggle.
      WRITE: ${{ github.event_name == 'schedule' && 'true' || github.event.inputs.write }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Crawl Fashionphile live inventory (writes the live snapshot)
        run: npx tsx supabase/ingest/sources/fashionphile-crawl.ts "$COLLECTION"

      - name: Retire sold / pulled listings
        run: |
          SNAP=data/ingest/_raw/fashionphile-live.json
          if [ "$WRITE" = "true" ]; then
            npm run reconcile:sold -- --platform=fashionphile --snapshot="$SNAP" --write
          else
            npm run reconcile:sold -- --platform=fashionphile --snapshot="$SNAP"
          fi
